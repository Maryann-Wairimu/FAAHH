<!DOCTYPE html>
<html>
<head>
    <title>Faah Detector 😂</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            transition: background-color 0.3s;
        }

        h1 {
            font-size: 40px;
        }

        textarea {
            width: 60%;
            height: 120px;
            padding: 15px;
            font-size: 18px;
            border-radius: 10px;
        }

        button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background-color: black;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: crimson;
        }

        #response {
            margin-top: 30px;
            font-size: 28px;
            font-weight: bold;
        }

        .shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0% { transform: translate(5px, 5px); }
            25% { transform: translate(-5px, 5px); }
            50% { transform: translate(5px, -5px); }
            75% { transform: translate(-5px, -5px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

    <h1>Faah Detector 🔥</h1>
    <p>Type your dramatic situation below 👇</p>

    <textarea id="userInput" placeholder="Tell me what happened..."></textarea><br>
    <button onclick="detectDrama()">Analyze 😭</button>

    <div id="response"></div>

    <audio id="faahSound" src="faah.mp3"></audio>

    <script>
        function detectDrama() {
            let text = document.getElementById("userInput").value.toLowerCase();
            let response = document.getElementById("response");
            let sound = document.getElementById("faahSound");

            let dramaticWords = ["cheated", "left", "broke", "failed", "rejected", "embarrassed", "toxic", "dumped", "blocked"];

            let isDramatic = dramaticWords.some(word => text.includes(word));

            if (isDramatic) {
                response.innerHTML = "💥 FAAAAAAAHHHH 😭😭😭";
                document.body.style.backgroundColor = "crimson";
                document.body.classList.add("shake");
                sound.play();

                setTimeout(() => {
                    document.body.style.backgroundColor = "white";
                    document.body.classList.remove("shake");
                }, 1000);

            } else {
                response.innerHTML = "Hmm… not dramatic enough 😌";
                document.body.style.backgroundColor = "#f4f4f4";
            }
        }
    </script>

</body>
</html>
